<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập — HR Portal</title>
  <script src="js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-soft-lg p-10 w-full max-w-md border border-slate-100 fade-in">
    <div class="mb-10 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-slate-900 rounded-2xl mb-4 shadow-lg shadow-slate-200">
        <span class="text-white font-black text-xl">HR</span>
      </div>
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">Chào mừng trở lại!</h1>
      <p class="text-slate-500 text-sm mt-2">Nhập thông tin để truy cập HR Portal</p>
    </div>

    <form onsubmit="login(event)" class="space-y-6">
      <div>
        <label for="loginEmail" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Email</label>
        <div class="relative group">
          <input
            type="email"
            id="loginEmail"
            placeholder="example@gmail.com"
            class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3.5 text-sm font-medium focus:border-slate-900 focus:ring-4 focus:ring-slate-900/5 transition-all outline-none"
          />
        </div>
      </div>

      <div>
        <label for="loginPassword" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Mật khẩu</label>
        <input
          type="password"
          id="loginPassword"
          placeholder="••••••••"
          class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3.5 text-sm font-medium focus:border-slate-900 focus:ring-4 focus:ring-slate-900/5 transition-all outline-none"
        />
      </div>

      <div class="flex items-center justify-between py-1">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input type="checkbox" class="w-4 h-4 rounded text-slate-900 focus:ring-slate-900/20 border-slate-200">
          <span class="text-xs font-medium text-slate-500 group-hover:text-slate-700 transition-colors">Ghi nhớ tôi</span>
        </label>
        <a href="#" class="text-xs font-bold text-slate-900 hover:text-slate-700 transition-colors">Quên mật khẩu?</a>
      </div>

      <button
        type="submit"
        class="w-full rounded-2xl bg-slate-900 text-white text-sm font-black px-6 py-4 hover:bg-slate-800 shadow-xl shadow-slate-200 transition-all active:scale-95 mt-2">
        Đăng nhập
      </button>
    </form>

    <div class="mt-10 pt-8 border-t border-slate-50 text-center">
      <p class="text-sm text-slate-500 font-medium">
        Chưa có tài khoản?
        <a href="register.html" class="text-slate-900 font-black hover:underline underline-offset-4 ml-1">Đăng ký ngay</a>
      </p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
