<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đánh giá Nhân viên — Quản trị viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Đánh giá</h2>
          <p class="text-slate-500 text-sm mt-1">Quản lý kết quả đánh giá năng lực định kỳ của nhân viên.</p>
        </div>
        <button onclick="openAdd()" class="inline-flex items-center gap-2 rounded-2xl bg-primary-600 text-white text-sm font-black px-6 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95 self-start sm:self-auto">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Thêm đánh giá
        </button>
      </div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
        <div id="evalTable">
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead class="bg-slate-50/50 border-b border-slate-100">
                <tr>
                  <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nhân viên</th>
                  <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Kỳ đánh giá</th>
                  <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Điểm số</th>
                  <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nhận xét</th>
                  <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Thao tác</th>
                </tr>
              </thead>
              <tbody id="evalTableBody" class="divide-y divide-slate-50"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="evalModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
      <div class="p-8 border-b border-slate-50">
        <h3 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Thêm đánh giá</h3>
      </div>
      
      <div class="p-8 space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nhân viên <span class="text-rose-500">*</span></label>
          <select id="empSelect" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none"></select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Kỳ đánh giá</label>
          <input id="periodInput" type="text" placeholder="VD: Q1-2026" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Điểm số (0 - 10)</label>
          <input id="scoreInput" type="number" min="0" max="10" step="0.5" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nhận xét</label>
          <textarea id="commentInput" rows="4" placeholder="Nhập nhận xét chi tiết..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none resize-none"></textarea>
        </div>
      </div>
      
      <div class="p-8 bg-slate-50/50 border-t border-slate-50 flex flex-col sm:flex-row justify-end gap-3">
        <button onclick="closeModal('evalModal')" class="rounded-2xl border-2 border-slate-100 text-slate-600 text-sm font-bold px-8 py-3.5 hover:bg-slate-100 transition-all">Hủy bỏ</button>
        <button onclick="saveItem()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">Lưu kết quả</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/evaluations.js"></script>
</body>
</html>
