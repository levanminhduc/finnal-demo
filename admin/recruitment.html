<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kế hoạch Tuyển dụng — Quản trị viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/ui-config.js"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Tuyển dụng</h2>
          <p class="text-slate-500 text-sm mt-1">Quản lý các tin tuyển dụng và nhu cầu nhân sự trong công ty.</p>
        </div>
        <button onclick="openAddModal()" class="inline-flex items-center gap-2 rounded-2xl bg-slate-900 text-white text-sm font-bold px-6 py-3.5 hover:bg-slate-800 shadow-xl shadow-slate-200 transition-all active:scale-95 self-start sm:self-auto">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Thêm tin mới
        </button>
      </div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
        <div id="recruitmentTable"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="recruitmentModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto border border-slate-100">
      <div class="p-8 border-b border-slate-50">
        <h3 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Thêm tin tuyển dụng</h3>
      </div>

      <form onsubmit="return false;" class="p-8 space-y-6">
        <input type="hidden" id="editId">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Tiêu đề vị trí <span class="text-rose-500">*</span></label>
          <input id="rTitle" type="text" placeholder="VD: UI/UX Designer" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Phòng ban</label>
          <select id="rDepartment" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
            <option value="IT">IT (Kỹ thuật)</option>
            <option value="HR">HR (Nhân sự)</option>
            <option value="Kế toán">Kế toán</option>
            <option value="Marketing">Marketing</option>
            <option value="Kinh doanh">Kinh doanh</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Mô tả & Yêu cầu công việc</label>
          <textarea id="rDescription" rows="5" placeholder="Mô tả tóm tắt yêu cầu công việc..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Trạng thái tin</label>
          <select id="rStatus" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
            <option value="Open">Đang mở (Open)</option>
            <option value="Closed">Đã đóng (Closed)</option>
          </select>
        </div>

        <div class="flex flex-col sm:flex-row justify-end gap-3 mt-10">
          <button type="button" onclick="closeModal('recruitmentModal')" class="rounded-2xl border-2 border-slate-100 text-slate-600 text-sm font-bold px-8 py-3.5 hover:bg-slate-50 transition-all">Hủy bỏ</button>
          <button type="button" onclick="saveRecruitment()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">Đăng tin</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/recruitment.js"></script>
</body>
</html>
