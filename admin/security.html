<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảo mật & Tài khoản — Quản trị viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Bảo mật</h2>
          <p class="text-slate-500 text-sm mt-1">Quản lý tài khoản hệ thống và thiết lập bảo mật.</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
          <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
            <div class="p-6 border-b border-slate-50">
              <h3 class="text-lg font-black text-slate-900 tracking-tight">Danh sách tài khoản</h3>
            </div>
            <div id="userTable"></div>
          </div>
        </div>

        <div class="lg:col-span-1">
          <div class="card bg-white p-8 border-none shadow-soft-lg">
            <h3 class="text-lg font-black text-slate-900 tracking-tight mb-6 flex items-center gap-2">
              <span class="w-1.5 h-6 bg-primary-600 rounded-full"></span>
              Đổi mật khẩu Admin
            </h3>
            <div class="space-y-6">
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Mật khẩu hiện tại</label>
                <input id="oldPassword" type="password" placeholder="••••••••" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Mật khẩu mới</label>
                <input id="newPassword" type="password" placeholder="••••••••" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Xác nhận mật khẩu</label>
                <input id="confirmNewPassword" type="password" placeholder="••••••••" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
              </div>
              <button onclick="changeAdminPassword()" class="w-full rounded-2xl bg-slate-900 text-white text-sm font-black px-6 py-4 hover:bg-slate-800 transition-all active:scale-95 shadow-xl shadow-slate-900/10 mt-2">
                Cập nhật mật khẩu
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/security.js"></script>
</body>
</html>
