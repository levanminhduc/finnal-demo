<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảo mật - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <header id="header" class="bg-white shadow px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-30"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden" onclick="toggleSidebar()"></div>
  <div class="flex gap-0 md:gap-6 p-4 md:p-6">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-white shadow-lg p-4 pt-20 transform -translate-x-full transition-transform md:relative md:translate-x-0 md:shadow-none md:p-0 md:bg-transparent md:z-0 md:sticky md:top-6 md:self-start shrink-0 overflow-y-auto md:max-h-[calc(100vh-5rem)]"></aside>
    <main class="flex-1 min-w-0">
      <h2 class="text-xl font-bold text-slate-800 mb-6">Bảo mật</h2>

      <div class="mb-8">
        <h3 class="text-base font-semibold text-slate-700 mb-3">Bảng tài khoản</h3>
        <div id="userTable"></div>
      </div>

      <div class="bg-white rounded-md shadow p-6 max-w-lg">
        <h3 class="text-base font-semibold text-slate-700 mb-4">Đổi mật khẩu admin</h3>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu hiện tại</label>
            <input id="oldPassword" type="password"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu mới</label>
            <input id="newPassword" type="password"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Xác nhận mật khẩu mới</label>
            <input id="confirmNewPassword" type="password"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
          </div>
          <button onclick="changeAdminPassword()"
            class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">
            Đổi mật khẩu
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/security.js"></script>
</body>
</html>
