<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lộ trình Thăng tiến — Quản trị viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Thăng tiến</h2>
          <p class="text-slate-500 text-sm mt-1">Theo dõi và quản lý các đề xuất thăng tiến, chuyển đổi vị trí.</p>
        </div>
        <button onclick="openAddModal()" class="inline-flex items-center gap-2 rounded-2xl bg-primary-600 text-white text-sm font-black px-6 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95 self-start sm:self-auto">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Thêm đề xuất
        </button>
      </div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
        <div id="promotionTable"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="promotionModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
      <div class="p-8 border-b border-slate-50">
        <h3 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Thêm đề xuất thăng tiến</h3>
      </div>
      
      <div class="p-8 space-y-6">
        <input type="hidden" id="editId">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nhân viên được đề xuất <span class="text-rose-500">*</span></label>
          <select id="pEmployee" onchange="fillCurrentPosition()" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none"></select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Vị trí hiện tại</label>
          <input id="pCurrentPosition" type="text" readonly class="w-full rounded-2xl border-2 border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-500 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Vị trí đề xuất mới <span class="text-rose-500">*</span></label>
          <input id="pNextPosition" type="text" placeholder="VD: Senior Manager" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Trạng thái phê duyệt</label>
          <select id="pStatus" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
            <option value="In Review">Đang xem xét (In Review)</option>
            <option value="Approved">Đã phê duyệt (Approved)</option>
            <option value="Rejected">Từ chối (Rejected)</option>
          </select>
        </div>
      </div>
      
      <div class="p-8 bg-slate-50/50 border-t border-slate-50 flex flex-col sm:flex-row justify-end gap-3">
        <button onclick="closeModal('promotionModal')" class="rounded-2xl border-2 border-slate-100 text-slate-600 text-sm font-bold px-8 py-3.5 hover:bg-slate-100 transition-all">Hủy bỏ</button>
        <button onclick="savePromotion()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">Lưu đề xuất</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/promotions.js"></script>
</body>
</html>
