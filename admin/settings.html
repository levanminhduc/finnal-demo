<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cài đặt hệ thống — Quản trị viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/ui-config.js"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Cài đặt</h2>
          <p class="text-slate-500 text-sm mt-1">Cấu hình các tham số hoạt động chung của hệ thống.</p>
        </div>
      </div>

      <div class="card bg-white p-8 border-none shadow-soft-lg max-w-2xl">
        <h3 class="text-lg font-black text-slate-900 tracking-tight mb-8 flex items-center gap-2">
          <span class="w-1.5 h-6 bg-primary-600 rounded-full"></span>
          Cấu hình chung
        </h3>
        
        <div class="space-y-8">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Tên tổ chức / Công ty</label>
            <input id="companyName" type="text" placeholder="VD: HR Management System" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Ngày công tiêu chuẩn/tháng</label>
              <input id="standardWorkDays" type="number" min="1" max="31" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Phụ cấp cơ bản (VNĐ)</label>
              <input id="defaultAllowance" type="number" min="0" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
            </div>
          </div>
          
          <div class="pt-4">
            <button onclick="saveSettings()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-10 py-4 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">
              Lưu cấu hình
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/settings.js"></script>
</body>
</html>
