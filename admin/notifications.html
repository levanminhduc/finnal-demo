<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông báo hệ thống — Quản trị viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Thông báo</h2>
          <p class="text-slate-500 text-sm mt-1">Gửi và quản lý các thông báo nội bộ đến nhân viên.</p>
        </div>
        <button onclick="openAdd()" class="inline-flex items-center gap-2 rounded-2xl bg-primary-600 text-white text-sm font-black px-6 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95 self-start sm:self-auto">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Tạo thông báo
        </button>
      </div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead class="bg-slate-50/50 border-b border-slate-100">
              <tr>
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Tiêu đề</th>
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Nội dung tóm tắt</th>
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Ngày đăng</th>
                <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Thao tác</th>
              </tr>
            </thead>
            <tbody id="notifTableBody" class="divide-y divide-slate-50"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="notifModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
      <div class="p-8 border-b border-slate-50">
        <h3 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Tạo thông báo mới</h3>
      </div>
      
      <div class="p-8 space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Tiêu đề thông báo</label>
          <input id="titleInput" type="text" placeholder="VD: Thông báo nghỉ lễ 2/9" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none" />
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nội dung chi tiết</label>
          <textarea id="contentInput" rows="5" placeholder="Nhập nội dung thông báo chi tiết tại đây..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none resize-none"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Ngày hiệu lực</label>
          <input id="dateInput" type="date" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
        </div>
      </div>
      
      <div class="p-8 bg-slate-50/50 border-t border-slate-50 flex flex-col sm:flex-row justify-end gap-3">
        <button onclick="closeModal('notifModal')" class="rounded-2xl border-2 border-slate-100 text-slate-600 text-sm font-bold px-8 py-3.5 hover:bg-slate-100 transition-all">Hủy bỏ</button>
        <button onclick="saveItem()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">Đăng thông báo</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/notifications.js"></script>
</body>
</html>
