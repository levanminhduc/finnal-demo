<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Nhân viên - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <header id="header" class="bg-white shadow px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-30"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden" onclick="toggleSidebar()"></div>
  <div class="flex gap-0 md:gap-6 p-4 md:p-6">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-white shadow-lg p-4 pt-20 transform -translate-x-full transition-transform md:relative md:translate-x-0 md:shadow-none md:p-0 md:bg-transparent md:z-0 md:sticky md:top-6 md:self-start shrink-0 overflow-y-auto md:max-h-[calc(100vh-5rem)]"></aside>
    <main class="flex-1 min-w-0">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-slate-800">Quản lý Nhân viên</h2>
        <button onclick="openAddEmployee()" class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">
          + Thêm nhân viên
        </button>
      </div>
      <div class="flex gap-2 mb-4">
        <input id="searchInput" type="text" placeholder="Tìm kiếm theo tên..."
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
          oninput="searchEmployee()" />
      </div>
      <div id="employeeTable"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-md shadow-lg p-6 w-full max-w-lg max-h-screen overflow-y-auto">
      <h3 id="modalTitle" class="text-lg font-semibold text-slate-800 mb-4">Thêm nhân viên</h3>
      <form onsubmit="return false;">
        <div class="grid grid-cols-2 gap-3">
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1">Họ tên <span class="text-red-500">*</span></label>
            <input id="empName" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Giới tính</label>
            <select id="empGender" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Ngày sinh</label>
            <input id="empDob" type="date" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Số điện thoại</label>
            <input id="empPhone" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Phòng ban <span class="text-red-500">*</span></label>
            <select id="empDepartment" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Kế toán">Kế toán</option>
              <option value="Marketing">Marketing</option>
              <option value="Kinh doanh">Kinh doanh</option>
            </select>
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1">Địa chỉ</label>
            <input id="empAddress" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1">Chức vụ</label>
            <input id="empPosition" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <!-- Fields only for adding new employee -->
          <div id="authFields" class="col-span-2">
            <div class="border-t border-slate-200 pt-3 mt-1 mb-3">
              <p class="text-xs font-semibold text-slate-500 uppercase">Thông tin tài khoản</p>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Email <span class="text-red-500">*</span></label>
                <input id="empEmail" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
              </div>
              <div>
                <label class="block text-xs font-medium text-slate-600 mb-1">Mật khẩu <span class="text-red-500">*</span></label>
                <input id="empPassword" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
              </div>
            </div>
          </div>
        </div>
        <div class="flex justify-end gap-2 mt-5">
          <button type="button" onclick="closeModal('modal')" class="rounded-md border border-slate-300 text-slate-700 text-sm px-4 py-2 hover:bg-slate-50">Hủy</button>
          <button type="button" onclick="saveEmployee()" class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/employees.js"></script>
</body>
</html>
