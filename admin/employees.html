<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Nhân viên — Quản trị viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Nhân viên</h2>
          <p class="text-slate-500 text-sm mt-1">Quản lý danh sách và hồ sơ nhân sự toàn công ty.</p>
        </div>
        <button onclick="openAddEmployee()" class="inline-flex items-center gap-2 rounded-2xl bg-primary-600 text-white text-sm font-black px-6 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95 self-start sm:self-auto">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Thêm nhân viên
        </button>
      </div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg mb-6">
        <div class="p-6 border-b border-slate-50 flex items-center gap-4">
          <div class="relative flex-1">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </span>
            <input id="searchInput" type="text" placeholder="Tìm kiếm nhân viên theo tên..."
              class="w-full rounded-2xl border-2 border-slate-100 pl-12 pr-4 py-3 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none"
              oninput="searchEmployee()" />
          </div>
        </div>
        <div id="employeeTable"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto border border-slate-100">
      <div class="p-8 border-b border-slate-50">
        <h3 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Thêm nhân viên</h3>
        <p class="text-slate-500 text-sm mt-1">Điền đầy đủ các thông tin bắt buộc dưới đây.</p>
      </div>
      
      <form onsubmit="return false;" class="p-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Họ tên nhân viên <span class="text-rose-500">*</span></label>
            <input id="empName" type="text" placeholder="Nguyễn Văn A" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none" />
          </div>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Giới tính</label>
            <select id="empGender" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
            </select>
          </div>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Ngày sinh</label>
            <input id="empDob" type="date" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Số điện thoại</label>
            <input id="empPhone" type="text" placeholder="0901234567" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Phòng ban <span class="text-rose-500">*</span></label>
            <select id="empDepartment" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
              <option value="IT">IT (Kỹ thuật)</option>
              <option value="HR">HR (Nhân sự)</option>
              <option value="Kế toán">Kế toán</option>
              <option value="Marketing">Marketing</option>
              <option value="Kinh doanh">Kinh doanh</option>
            </select>
          </div>
          
          <div class="md:col-span-2">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Địa chỉ thường trú</label>
            <input id="empAddress" type="text" placeholder="Số 123, Đường ABC, Quận XYZ..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <div class="md:col-span-2">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Chức vụ hiện tại</label>
            <input id="empPosition" type="text" placeholder="Senior Developer, Lead Designer..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <!-- Fields only for adding new employee -->
          <div id="authFields" class="md:col-span-2 space-y-6">
            <div class="border-t border-slate-100 pt-8 mt-4">
              <h4 class="text-sm font-black text-slate-900 uppercase tracking-tight flex items-center gap-2">
                <span class="w-1 h-4 bg-primary-600 rounded-full"></span>
                Thiết lập tài khoản
              </h4>
              <p class="text-slate-400 text-xs mt-1">Thông tin này được dùng để nhân viên đăng nhập vào hệ thống.</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Email đăng nhập <span class="text-rose-500">*</span></label>
                <input id="empEmail" type="text" placeholder="email@congty.com" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Mật khẩu khởi tạo <span class="text-rose-500">*</span></label>
                <input id="empPassword" type="text" placeholder="••••••••" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
              </div>
            </div>
          </div>
        </div>
        
        <div class="flex flex-col sm:flex-row justify-end gap-3 mt-10">
          <button type="button" onclick="closeModal('modal')" class="rounded-2xl border-2 border-slate-100 text-slate-600 text-sm font-bold px-8 py-3.5 hover:bg-slate-50 transition-all">Hủy bỏ</button>
          <button type="button" onclick="saveEmployee()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">Lưu thông tin</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/employees.js"></script>
</body>
</html>
