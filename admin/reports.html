<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Báo cáo & Thống kê — Quản trị viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/ui-config.js"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Báo cáo</h2>
          <p class="text-slate-500 text-sm mt-1">Tổng hợp và phân tích dữ liệu nhân sự toàn công ty.</p>
        </div>
      </div>

      <div id="statCards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8"></div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
        <div id="reportTable"></div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/reports.js"></script>
</body>
</html>
