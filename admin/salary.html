<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Lương thưởng — Quản trị viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Lương thưởng</h2>
          <p class="text-slate-500 text-sm mt-1">Quản lý bảng lương, thưởng và các khoản khấu trừ của nhân viên.</p>
        </div>
        <button onclick="openAddSalary()" class="inline-flex items-center gap-2 rounded-2xl bg-slate-900 text-white text-sm font-bold px-6 py-3.5 hover:bg-slate-800 shadow-xl shadow-slate-200 transition-all active:scale-95 self-start sm:self-auto">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
          Tạo phiếu lương
        </button>
      </div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
        <div id="salaryTable"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100">
      <div class="p-8 border-b border-slate-50">
        <h3 id="modalTitle" class="text-2xl font-black text-slate-900 tracking-tight">Thêm phiếu lương</h3>
      </div>
      
      <div class="p-8 space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nhân viên <span class="text-rose-500">*</span></label>
          <select id="empSelect" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
            <option value="">-- Chọn nhân viên --</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Tháng lương</label>
          <input type="month" id="monthInput" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Lương cơ bản (đ)</label>
            <input type="number" id="baseInput" min="0" oninput="calcTotal()" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Thưởng (đ)</label>
            <input type="number" id="bonusInput" min="0" value="0" oninput="calcTotal()" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Khấu trừ (đ)</label>
            <input type="number" id="deductionInput" min="0" value="0" oninput="calcTotal()" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Tổng nhận</label>
            <input type="text" id="totalDisplay" readonly class="w-full rounded-2xl border-2 border-slate-200 bg-slate-50 px-4 py-3 text-sm font-bold text-primary-600 outline-none cursor-not-allowed" />
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Trạng thái thanh toán</label>
          <select id="statusSelect" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
            <option value="Pending">Đang chờ (Pending)</option>
            <option value="Paid">Đã thanh toán (Paid)</option>
          </select>
        </div>
      </div>
      
      <div class="p-8 bg-slate-50/50 border-t border-slate-50 flex flex-col sm:flex-row justify-end gap-3">
        <button onclick="closeModal('modal')" class="rounded-2xl border-2 border-slate-100 text-slate-600 text-sm font-bold px-8 py-3.5 hover:bg-slate-100 transition-all">Hủy bỏ</button>
        <button onclick="saveSalary()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">Lưu phiếu lương</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/salary.js"></script>
</body>
</html>
