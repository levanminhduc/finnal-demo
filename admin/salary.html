<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Lương thưởng - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <header id="header" class="bg-white shadow px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-30"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden" onclick="toggleSidebar()"></div>
  <div class="flex gap-0 md:gap-6 p-4 md:p-6">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-white shadow-lg p-4 pt-20 transform -translate-x-full transition-transform md:relative md:translate-x-0 md:shadow-none md:p-0 md:bg-transparent md:z-0 md:sticky md:top-6 md:self-start shrink-0 overflow-y-auto md:max-h-[calc(100vh-5rem)]"></aside>
    <main class="flex-1 min-w-0">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-slate-800">Quản lý Lương thưởng</h2>
        <button onclick="openAddSalary()"
          class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">
          + Thêm phiếu lương
        </button>
      </div>
      <div id="salaryTable"></div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-md shadow-lg p-6 w-full max-w-lg">
      <h3 class="text-lg font-semibold text-slate-800 mb-4" id="modalTitle">Thêm phiếu lương</h3>
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Nhân viên</label>
          <select id="empSelect"
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            <option value="">-- Chọn nhân viên --</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tháng</label>
          <input type="month" id="monthInput"
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Lương cơ bản (đ)</label>
            <input type="number" id="baseInput" min="0" oninput="calcTotal()"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Thưởng (đ)</label>
            <input type="number" id="bonusInput" min="0" value="0" oninput="calcTotal()"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Khấu trừ (đ)</label>
            <input type="number" id="deductionInput" min="0" value="0" oninput="calcTotal()"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Tổng lương</label>
            <input type="text" id="totalDisplay" readonly
              class="w-full rounded-md border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600 cursor-not-allowed">
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Trạng thái</label>
          <select id="statusSelect"
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            <option value="Pending">Pending</option>
            <option value="Paid">Paid</option>
          </select>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button onclick="closeModal('modal')"
          class="rounded-md border border-slate-300 text-slate-700 text-sm px-4 py-2 hover:bg-slate-50">
          Hủy
        </button>
        <button onclick="saveSalary()"
          class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">
          Lưu
        </button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/salary.js"></script>
</body>
</html>
