<!DOCTYPE html><html lang="vi"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phúc lợi - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-slate-100 min-h-screen">
  <header id="header" class="bg-white shadow px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-30"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden" onclick="toggleSidebar()"></div>
  <div class="flex gap-0 md:gap-6 p-4 md:p-6">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-white shadow-lg p-4 pt-20 transform -translate-x-full transition-transform md:relative md:translate-x-0 md:shadow-none md:p-0 md:bg-transparent md:z-0 md:sticky md:top-6 md:self-start shrink-0 overflow-y-auto md:max-h-[calc(100vh-5rem)]"></aside>
    <main class="flex-1 min-w-0">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold text-slate-800">Phúc lợi</h1>
        <button onclick="openAdd()" class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">+ Thêm phúc lợi</button>
      </div>
      <div class="overflow-x-auto"><table class="w-full bg-white rounded-md shadow overflow-hidden">
        <thead class="bg-slate-100">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Tên</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Mô tả</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Thao tác</th>
          </tr>
        </thead>
        <tbody id="benefitTableBody" class="divide-y divide-slate-100"></tbody>
      </table></div>
    </main>
  </div>

  <div id="benefitModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-md shadow-lg p-6 w-full max-w-lg">
      <h2 class="text-lg font-semibold text-slate-800 mb-4" id="modalTitle">Thêm phúc lợi</h2>
      <div class="space-y-3">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Tên phúc lợi</label>
          <input id="titleInput" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Mô tả</label>
          <textarea id="descInput" rows="3" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"></textarea>
        </div>
      </div>
      <div class="flex justify-end gap-2 mt-5">
        <button onclick="closeModal('benefitModal')" class="rounded-md border border-slate-300 text-slate-700 text-sm px-4 py-2 hover:bg-slate-50">Hủy</button>
        <button onclick="saveItem()" class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">Lưu</button>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/benefits.js"></script>
</body></html>
