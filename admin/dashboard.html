<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tổng quan — Quản trị viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="mb-8">
        <h2 class="text-3xl font-black text-slate-900 tracking-tight">Tổng quan</h2>
        <p class="text-slate-500 text-sm mt-1">Chào mừng bạn quay trở lại với hệ thống quản trị.</p>
      </div>

      <div id="statsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10"></div>
      
      <div class="card bg-white">
        <div class="flex items-center justify-between mb-6">
          <h3 class="font-bold text-slate-800 text-lg">Thông báo gần đây</h3>
          <a href="notifications.html" class="text-xs font-bold text-primary-600 hover:text-primary-700 uppercase tracking-widest">Xem tất cả</a>
        </div>
        <div id="recentNotifications" class="space-y-4"></div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin/dashboard.js"></script>
</body>
</html>
