<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bảng điều khiển — Nhân viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Tổng quan</h2>
          <p class="text-slate-500 text-sm mt-1">Chào mừng bạn quay trở lại hệ thống quản trị nhân sự.</p>
        </div>
      </div>

      <div id="statsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8"></div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
          <div id="employeeInfo" class="fade-in"></div>
        </div>
        <div class="lg:col-span-1">
          <div class="card bg-primary-600 text-white p-8 border-none shadow-xl shadow-primary-600/20">
            <h3 class="text-xl font-black mb-4 tracking-tight">Hỗ trợ nhanh</h3>
            <p class="text-white/80 text-sm mb-6 leading-relaxed">Bạn cần trợ giúp về các vấn đề nhân sự, lương thưởng hay phúc lợi? Hãy gửi yêu cầu hỗ trợ ngay.</p>
            <a href="supports.html" class="inline-flex items-center justify-center w-full bg-white text-primary-600 font-bold py-3.5 rounded-2xl hover:bg-primary-50 transition-all active:scale-95 shadow-lg shadow-black/5">
              Gửi yêu cầu hỗ trợ
            </a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/dashboard.js"></script>
</body>
</html>
