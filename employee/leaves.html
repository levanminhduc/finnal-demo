<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nghỉ phép - Nhân viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <header id="header" class="bg-white shadow px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-30"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden" onclick="toggleSidebar()"></div>
  <div class="flex gap-0 md:gap-6 p-4 md:p-6">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-white shadow-lg p-4 pt-20 transform -translate-x-full transition-transform md:relative md:translate-x-0 md:shadow-none md:p-0 md:bg-transparent md:z-0 md:sticky md:top-6 md:self-start shrink-0 overflow-y-auto md:max-h-[calc(100vh-5rem)]"></aside>
    <main class="flex-1 min-w-0">
      <h2 class="text-xl font-bold text-slate-800 mb-4">Đơn xin nghỉ phép</h2>

      <!-- Leave request form -->
      <div class="bg-white rounded-md shadow p-5 mb-6">
        <h3 class="font-semibold text-slate-700 mb-3">Gửi đơn xin nghỉ</h3>
        <form id="leaveForm" onsubmit="submitLeave(event)" class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Từ ngày</label>
              <input type="date" id="fromDate"
                class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Đến ngày</label>
              <input type="date" id="toDate"
                class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Lý do</label>
            <textarea id="reason" rows="3"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
              placeholder="Nhập lý do xin nghỉ..."></textarea>
          </div>
          <div class="flex justify-end">
            <button type="submit"
              class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">
              Gửi đơn
            </button>
          </div>
        </form>
      </div>

      <!-- Leave history -->
      <h3 class="font-semibold text-slate-700 mb-3">Lịch sử nghỉ phép</h3>
      <div id="leaveTable"></div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/leaves.js"></script>
</body>
</html>
