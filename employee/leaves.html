<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yêu cầu Nghỉ phép — Nhân viên</title>
  <script src="../js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Nghỉ phép</h2>
          <p class="text-slate-500 text-sm mt-1">Đăng ký và theo dõi trạng thái các đơn xin nghỉ phép.</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1">
          <div class="card bg-white p-8 border-none shadow-soft-lg sticky top-24">
            <h3 class="text-lg font-black text-slate-900 tracking-tight mb-6 flex items-center gap-2">
              <span class="w-1.5 h-6 bg-primary-600 rounded-full"></span>
              Gửi đơn xin nghỉ
            </h3>
            <form id="leaveForm" onsubmit="submitLeave(event)" class="space-y-6">
              <div class="grid grid-cols-1 gap-4">
                <div>
                  <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Từ ngày</label>
                  <input type="date" id="fromDate" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
                </div>
                <div>
                  <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Đến ngày</label>
                  <input type="date" id="toDate" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
                </div>
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Lý do nghỉ phép</label>
                <textarea id="reason" rows="4" placeholder="Nhập lý do xin nghỉ..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none resize-none"></textarea>
              </div>
              <button type="submit" class="w-full rounded-2xl bg-primary-600 text-white text-sm font-black px-6 py-4 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">
                Gửi đơn yêu cầu
              </button>
            </form>
          </div>
        </div>

        <div class="lg:col-span-2">
          <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
            <div class="p-6 border-b border-slate-50">
              <h3 class="text-lg font-black text-slate-900 tracking-tight">Lịch sử nghỉ phép</h3>
            </div>
            <div id="leaveTable"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/leaves.js"></script>
</body>
</html>
