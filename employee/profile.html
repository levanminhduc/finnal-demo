<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ cá nhân — Nhân viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/ui-config.js"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Hồ sơ cá nhân</h2>
          <p class="text-slate-500 text-sm mt-1">Thông tin chi tiết về hồ sơ nhân sự của bạn trên hệ thống.</p>
        </div>
        <button onclick="toggleEdit()" id="editBtn" class="inline-flex items-center gap-2 rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95 self-start sm:self-auto">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
          Chỉnh sửa thông tin
        </button>
      </div>

      <!-- Profile display card -->
      <div id="profileCard" class="fade-in mb-8"></div>

      <!-- Edit form -->
      <div id="editForm" class="hidden card bg-white p-8 border-none shadow-soft-lg max-w-3xl">
        <h3 class="text-xl font-black text-slate-900 tracking-tight mb-8 flex items-center gap-2">
          <span class="w-1.5 h-6 bg-primary-600 rounded-full"></span>
          Cập nhật thông tin hồ sơ
        </h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Họ tên nhân viên <span class="text-rose-500">*</span></label>
            <input id="editName" type="text" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Giới tính</label>
            <select id="editGender" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none">
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
            </select>
          </div>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Ngày sinh</label>
            <input id="editDob" type="date" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <div>
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Số điện thoại</label>
            <input id="editPhone" type="text" placeholder="0901234567" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
          
          <div class="md:col-span-2">
            <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Địa chỉ thường trú</label>
            <input id="editAddress" type="text" placeholder="Nhập địa chỉ của bạn..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
          </div>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-3 mt-10">
          <button onclick="saveProfile()" class="rounded-2xl bg-primary-600 text-white text-sm font-black px-8 py-3.5 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95">Lưu thay đổi</button>
          <button onclick="cancelEdit()" class="rounded-2xl border-2 border-slate-100 text-slate-600 text-sm font-bold px-8 py-3.5 hover:bg-slate-50 transition-all">Hủy bỏ</button>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/profile.js"></script>
</body>
</html>
