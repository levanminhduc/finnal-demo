<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hồ sơ cá nhân - Nhân viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <header id="header" class="bg-white shadow px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-30"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden" onclick="toggleSidebar()"></div>
  <div class="flex gap-0 md:gap-6 p-4 md:p-6">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-white shadow-lg p-4 pt-20 transform -translate-x-full transition-transform md:relative md:translate-x-0 md:shadow-none md:p-0 md:bg-transparent md:z-0 md:sticky md:top-6 md:self-start shrink-0 overflow-y-auto md:max-h-[calc(100vh-5rem)]"></aside>
    <main class="flex-1 min-w-0">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xl font-bold text-slate-800">Hồ sơ cá nhân</h2>
        <button onclick="toggleEdit()" id="editBtn"
          class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">
          Chỉnh sửa
        </button>
      </div>

      <!-- Profile display card -->
      <div id="profileCard" class="bg-white rounded-md shadow p-6 mb-4"></div>

      <!-- Edit form (hidden by default) -->
      <div id="editForm" class="hidden bg-white rounded-md shadow p-6">
        <h3 class="font-semibold text-slate-700 mb-4">Chỉnh sửa thông tin</h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="col-span-2">
            <label class="block text-xs font-medium text-slate-600 mb-1">Họ tên <span class="text-red-500">*</span></label>
            <input id="editName" type="text"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Giới tính</label>
            <select id="editGender"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
              <option value="Nam">Nam</option>
              <option value="Nữ">Nữ</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Ngày sinh</label>
            <input id="editDob" type="date"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Số điện thoại</label>
            <input id="editPhone" type="text"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-600 mb-1">Địa chỉ</label>
            <input id="editAddress" type="text"
              class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400" />
          </div>
        </div>
        <div class="flex gap-2 mt-5">
          <button onclick="saveProfile()"
            class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">Lưu</button>
          <button onclick="cancelEdit()"
            class="rounded-md border border-slate-300 text-slate-700 text-sm px-4 py-2 hover:bg-slate-50">Hủy</button>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/profile.js"></script>
</body>
</html>
