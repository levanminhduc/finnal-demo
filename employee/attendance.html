<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch sử Chấm công — Nhân viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/ui-config.js"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Chấm công</h2>
          <p class="text-slate-500 text-sm mt-1">Theo dõi dữ liệu chấm công và giờ giấc làm việc của bạn.</p>
        </div>
        <div class="flex items-center gap-3 self-start sm:self-auto">
          <label class="text-xs font-bold text-slate-400 uppercase tracking-widest ml-1 hidden lg:block">Chọn tháng:</label>
          <select id="filterMonth" onchange="renderMyAttendance()"
            class="rounded-2xl border-2 border-slate-100 px-4 py-2.5 text-sm font-medium focus:border-primary-500 outline-none bg-white">
            <option value="">Tất cả</option>
          </select>
        </div>
      </div>

      <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
        <div id="attendanceTable"></div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/attendance.js"></script>
</body>
</html>
