<!DOCTYPE html><html lang="vi"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hỗ trợ - Nhân viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head><body class="bg-slate-100 min-h-screen">
  <header id="header" class="bg-white shadow px-4 md:px-6 py-3 flex justify-between items-center sticky top-0 z-30"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/40 z-40 md:hidden" onclick="toggleSidebar()"></div>
  <div class="flex gap-0 md:gap-6 p-4 md:p-6">
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-56 bg-white shadow-lg p-4 pt-20 transform -translate-x-full transition-transform md:relative md:translate-x-0 md:shadow-none md:p-0 md:bg-transparent md:z-0 md:sticky md:top-6 md:self-start shrink-0 overflow-y-auto md:max-h-[calc(100vh-5rem)]"></aside>
    <main class="flex-1 min-w-0">
      <div class="mb-4">
        <h1 class="text-xl font-bold text-slate-800">Yêu cầu hỗ trợ</h1>
      </div>
      <div class="bg-white rounded-md shadow p-5 mb-6">
        <h2 class="text-base font-semibold text-slate-700 mb-3">Gửi yêu cầu mới</h2>
        <div class="space-y-3">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Tiêu đề</label>
            <input id="subjectInput" type="text" placeholder="Nhập tiêu đề yêu cầu..." class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nội dung</label>
            <textarea id="messageInput" rows="3" placeholder="Mô tả vấn đề cần hỗ trợ..." class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"></textarea>
          </div>
          <button onclick="submitSupport()" class="rounded-md bg-slate-800 text-white text-sm px-4 py-2 hover:bg-slate-700">Gửi yêu cầu</button>
        </div>
      </div>
      <h2 class="text-base font-semibold text-slate-700 mb-3">Lịch sử yêu cầu</h2>
      <div class="overflow-x-auto"><table class="w-full bg-white rounded-md shadow overflow-hidden">
        <thead class="bg-slate-100">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Tiêu đề</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Trạng thái</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Phản hồi từ admin</th>
          </tr>
        </thead>
        <tbody id="supportTableBody" class="divide-y divide-slate-100"></tbody>
      </table></div>
    </main>
  </div>
  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/supports.js"></script>
</body></html>
