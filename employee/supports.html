<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yêu cầu Hỗ trợ — Nhân viên</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../js/ui-config.js"></script>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <header id="header"></header>
  <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 md:hidden" onclick="toggleSidebar()"></div>
  
  <div class="flex flex-col md:flex-row min-h-[calc(100vh-4rem)]">
    <aside id="sidebar"></aside>
    
    <main class="flex-1 p-6 md:p-8 lg:p-10 fade-in">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
        <div>
          <h2 class="text-3xl font-black text-slate-900 tracking-tight">Hỗ trợ</h2>
          <p class="text-slate-500 text-sm mt-1">Gửi yêu cầu giải đáp thắc mắc hoặc hỗ trợ kỹ thuật đến Admin.</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1">
          <div class="card bg-white p-8 border-none shadow-soft-lg sticky top-24">
            <h3 class="text-lg font-black text-slate-900 tracking-tight mb-6 flex items-center gap-2">
              <span class="w-1.5 h-6 bg-primary-600 rounded-full"></span>
              Gửi yêu cầu mới
            </h3>
            <div class="space-y-6">
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Tiêu đề yêu cầu</label>
                <input id="subjectInput" type="text" placeholder="VD: Thắc mắc về bảng lương tháng 8" class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none" />
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Nội dung chi tiết</label>
                <textarea id="messageInput" rows="5" placeholder="Mô tả chi tiết vấn đề bạn đang gặp phải..." class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3 text-sm font-medium focus:border-primary-500 outline-none resize-none"></textarea>
              </div>
              <button onclick="submitSupport()" class="w-full rounded-2xl bg-slate-900 text-white text-sm font-black px-6 py-4 hover:bg-slate-800 transition-all active:scale-95 shadow-xl shadow-slate-900/10">
                Gửi yêu cầu hỗ trợ
              </button>
            </div>
          </div>
        </div>

        <div class="lg:col-span-2">
          <div class="card bg-white p-0 overflow-hidden border-none shadow-soft-lg">
            <div class="p-6 border-b border-slate-50">
              <h3 class="text-lg font-black text-slate-900 tracking-tight">Lịch sử yêu cầu</h3>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50/50 border-b border-slate-100">
                  <tr>
                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Tiêu đề</th>
                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Trạng thái</th>
                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Phản hồi từ Admin</th>
                  </tr>
                </thead>
                <tbody id="supportTableBody" class="divide-y divide-slate-50"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/shared.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/employee/supports.js"></script>
</body>
</html>
