<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký — HR System</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-md shadow p-8 w-full max-w-md">
    <div class="mb-6 text-center">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-slate-800 rounded-full mb-3">
        <span class="text-white font-bold">HR</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-800">Đăng ký tài khoản</h1>
      <p class="text-slate-500 text-sm mt-1">Tạo tài khoản để truy cập hệ thống</p>
    </div>

    <form onsubmit="register(event)" class="space-y-4">
      <div>
        <label for="regName" class="block text-sm font-medium text-slate-700 mb-1">Họ tên</label>
        <input
          type="text"
          id="regName"
          placeholder="Nguyễn Văn A"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
        />
      </div>

      <div>
        <label for="regEmail" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input
          type="email"
          id="regEmail"
          placeholder="example@gmail.com"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
        />
      </div>

      <div>
        <label for="regPassword" class="block text-sm font-medium text-slate-700 mb-1">Mật khẩu</label>
        <input
          type="password"
          id="regPassword"
          placeholder="••••••••"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
        />
      </div>

      <div>
        <label for="regConfirmPassword" class="block text-sm font-medium text-slate-700 mb-1">Xác nhận mật khẩu</label>
        <input
          type="password"
          id="regConfirmPassword"
          placeholder="••••••••"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-md bg-slate-800 text-white text-sm px-4 py-2.5 hover:bg-slate-700 transition-colors mt-2">
        Đăng ký
      </button>
    </form>

    <p class="text-center text-sm text-slate-500 mt-6">
      Đã có tài khoản?
      <a href="login.html" class="text-slate-800 font-medium hover:underline">Đăng nhập</a>
    </p>
  </div>

  <script src="js/data.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
