<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký — HR Portal</title>
  <script src="js/ui-config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-3xl shadow-soft-lg p-10 w-full max-w-md border border-slate-100 fade-in">
    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-primary-600 rounded-2xl mb-4 shadow-lg shadow-primary-600/20">
        <span class="text-white font-black text-xl">HR</span>
      </div>
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">Tạo tài khoản mới</h1>
      <p class="text-slate-500 text-sm mt-2">Bắt đầu trải nghiệm HR Portal ngay hôm nay</p>
    </div>

    <form onsubmit="register(event)" class="space-y-5">
      <div>
        <label for="regName" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Họ tên của bạn</label>
        <input
          type="text"
          id="regName"
          placeholder="Nguyễn Văn A"
          class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3.5 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none"
        />
      </div>

      <div>
        <label for="regEmail" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Email doanh nghiệp</label>
        <input
          type="email"
          id="regEmail"
          placeholder="example@abc.com"
          class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3.5 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none"
        />
      </div>

      <div>
        <label for="regPassword" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Mật khẩu</label>
        <input
          type="password"
          id="regPassword"
          placeholder="••••••••"
          class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3.5 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none"
        />
      </div>

      <div>
        <label for="regConfirmPassword" class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Xác nhận mật khẩu</label>
        <input
          type="password"
          id="regConfirmPassword"
          placeholder="••••••••"
          class="w-full rounded-2xl border-2 border-slate-100 px-4 py-3.5 text-sm font-medium focus:border-primary-500 focus:ring-4 focus:ring-primary-500/5 transition-all outline-none"
        />
      </div>

      <div class="py-1">
        <label class="flex items-start gap-3 cursor-pointer group">
          <input type="checkbox" class="mt-1 w-4 h-4 rounded text-primary-600 focus:ring-primary-500/20 border-slate-200" checked>
          <span class="text-xs font-medium text-slate-500 leading-relaxed group-hover:text-slate-700 transition-colors">
            Tôi đồng ý với các <a href="#" class="text-primary-600 font-bold hover:underline">Điều khoản dịch vụ</a> và <a href="#" class="text-primary-600 font-bold hover:underline">Chính sách bảo mật</a>.
          </span>
        </label>
      </div>

      <button
        type="submit"
        class="w-full rounded-2xl bg-primary-600 text-white text-sm font-black px-6 py-4 hover:bg-primary-700 shadow-xl shadow-primary-600/20 transition-all active:scale-95 mt-2">
        Đăng ký ngay
      </button>
    </form>

    <div class="mt-10 pt-8 border-t border-slate-50 text-center">
      <p class="text-sm text-slate-500 font-medium">
        Đã có tài khoản?
        <a href="login.html" class="text-primary-600 font-black hover:underline underline-offset-4 ml-1">Đăng nhập</a>
      </p>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
